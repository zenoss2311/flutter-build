name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      release_url:
        description: 'URL halaman release GitHub yang berisi ZIP project'
        required: true
      tag:
        description: 'Tag release'
        required: true
      build_type:
        description: 'debug atau release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (untuk akses token repo ini)
        uses: actions/checkout@v4

      - name: Download & extract project ZIP dari release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          TAG="${{ inputs.tag }}"
          ASSET_URL=$(curl -sL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['assets'][0]['url'])")
          curl -sL -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" \
            "$ASSET_URL" -o project.zip
          mkdir -p project_raw
          unzip -q project.zip -d project_raw

      - name: Cari folder pubspec.yaml (handle nested zip)
        id: findroot
        run: |
          PUBSPEC=$(find project_raw -maxdepth 4 -name "pubspec.yaml" | head -n1)
          if [ -z "$PUBSPEC" ]; then
            echo "❌ pubspec.yaml tidak ditemukan di dalam ZIP!"
            exit 1
          fi
          ROOT=$(dirname "$PUBSPEC")
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter pub get

      - name: Build APK (debug)
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter build apk --debug

      - name: Build APK (release)
        if: ${{ inputs.build_type != 'debug' }}
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ${{ steps.findroot.outputs.root }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 1
